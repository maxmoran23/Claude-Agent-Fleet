name: fleet-watchdog

on:
  schedule:
    - cron: "30 */6 * * *"  # every 6 hours, 30 min past the hour (offset from tracked workflows)
  workflow_dispatch: {}

concurrency:
  group: fleet-watchdog
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run fleet-watchdog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DEFAULT_CHANNEL: ${{ secrets.SLACK_DEFAULT_CHANNEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONPATH: .
        run: python agents/fleet_watchdog/agent.py
