name: regulatory-oracle

on:
  schedule:
    - cron: "0 12 * * *"  # 08:00 America/New_York (standard time)
  workflow_dispatch: {}

concurrency:
  group: regulatory-oracle
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run regulatory-oracle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DEFAULT_CHANNEL: ${{ secrets.SLACK_DEFAULT_CHANNEL }}
          PYTHONPATH: .
        run: python agents/regulatory_oracle/agent.py
