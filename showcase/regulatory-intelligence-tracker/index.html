<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Asset Regulatory Intelligence Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #141829;
            --bg-tertiary: #1a1f3a;
            --border-color: #2d3561;
            --text-primary: #e8eaf6;
            --text-secondary: #b0b9db;
            --text-tertiary: #7c87b8;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --status-enacted: #10b981;
            --status-proposed: #f59e0b;
            --status-pending: #f97316;
            --status-blocked: #ef4444;
            --status-monitoring: #3b82f6;
        }

        :root.light-mode {
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-tertiary: #e2e8f0;
            --border-color: #cbd5e1;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-tertiary: #64748b;
            --accent-primary: #4f46e5;
            --accent-secondary: #7c3aed;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            padding: 20px;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-content h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-content p {
            font-size: 13px;
            color: var(--text-tertiary);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.05em;
        }

        .header-controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .theme-toggle {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background-color: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        .view-toggle {
            display: flex;
            gap: 4px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px;
        }

        .view-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .view-btn.active {
            background: var(--accent-primary);
            color: white;
        }

        /* Controls Section */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
            background: var(--bg-secondary);
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background-color: var(--bg-tertiary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            pointer-events: none;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .filter-label {
            font-size: 12px;
            color: var(--text-tertiary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            align-self: center;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        /* Status Badges */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-enacted {
            background-color: rgba(16, 185, 129, 0.15);
            color: var(--status-enacted);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-proposed {
            background-color: rgba(245, 158, 11, 0.15);
            color: var(--status-proposed);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-pending {
            background-color: rgba(249, 115, 22, 0.15);
            color: var(--status-pending);
            border: 1px solid rgba(249, 115, 22, 0.3);
        }

        .badge-blocked {
            background-color: rgba(239, 68, 68, 0.15);
            color: var(--status-blocked);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .badge-monitoring {
            background-color: rgba(59, 130, 246, 0.15);
            color: var(--status-monitoring);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        /* Card View */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 12px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }

        .card-meta {
            font-size: 11px;
            color: var(--text-tertiary);
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
        }

        .card-content {
            margin-bottom: 16px;
        }

        .card-description {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .card-tag {
            background: var(--bg-tertiary);
            color: var(--text-tertiary);
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            border: 1px solid var(--border-color);
        }

        .card-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-expand {
            color: var(--accent-primary);
            font-size: 12px;
            cursor: pointer;
            font-weight: 500;
        }

        /* Expanded Detail */
        .card.expanded {
            grid-column: 1 / -1;
        }

        .expanded-content {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            display: none;
        }

        .card.expanded .expanded-content {
            display: block;
        }

        .detail-section {
            margin-bottom: 16px;
        }

        .detail-section h4 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--accent-primary);
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .detail-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .detail-list {
            list-style: none;
            margin-left: 0;
        }

        .detail-list li {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 6px 0;
            padding-left: 20px;
            position: relative;
        }

        .detail-list li::before {
            content: '▸';
            position: absolute;
            left: 4px;
            color: var(--accent-primary);
        }

        /* Timeline View */
        .timeline {
            position: relative;
            padding: 20px 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 40px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--accent-primary), var(--accent-secondary));
        }

        .timeline-item {
            margin-bottom: 32px;
            padding-left: 120px;
            position: relative;
        }

        .timeline-marker {
            position: absolute;
            left: 23px;
            top: 4px;
            width: 34px;
            height: 34px;
            background: var(--bg-secondary);
            border: 2px solid var(--accent-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .timeline-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
        }

        .timeline-date {
            font-size: 11px;
            color: var(--accent-primary);
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .timeline-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .timeline-description {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Agency Cards */
        .agency-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .agency-card {
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            transition: all 0.3s;
        }

        .agency-card:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
        }

        .agency-header {
            margin-bottom: 12px;
        }

        .agency-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .agency-lead {
            font-size: 11px;
            color: var(--text-tertiary);
            font-family: 'JetBrains Mono', monospace;
            margin-top: 4px;
        }

        .agency-stance {
            display: inline-block;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 3px;
            margin-top: 8px;
            font-weight: 500;
        }

        .stance-proactive {
            background-color: rgba(16, 185, 129, 0.15);
            color: var(--status-enacted);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .stance-cautious {
            background-color: rgba(245, 158, 11, 0.15);
            color: var(--status-proposed);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .stance-restrictive {
            background-color: rgba(239, 68, 68, 0.15);
            color: var(--status-blocked);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .agency-items {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Impact Matrix */
        .impact-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .impact-table thead {
            background: var(--bg-tertiary);
        }

        .impact-table th {
            padding: 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .impact-table td {
            padding: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .impact-table tbody tr:last-child td {
            border-bottom: none;
        }

        .impact-high {
            color: var(--status-blocked);
            font-weight: 600;
        }

        .impact-medium {
            color: var(--status-proposed);
            font-weight: 600;
        }

        .impact-low {
            color: var(--text-secondary);
        }

        /* Tabs */
        .tab-nav {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 12px 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-btn.active {
            color: var(--accent-primary);
            border-bottom-color: var(--accent-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
        }

        .empty-state p {
            font-size: 14px;
            margin-bottom: 12px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            .header-controls {
                width: 100%;
                justify-content: space-between;
            }

            .controls {
                flex-direction: column;
            }

            .filter-group {
                flex-direction: column;
            }

            .timeline::before {
                left: 15px;
            }

            .timeline-item {
                padding-left: 80px;
            }

            .timeline-marker {
                left: 0;
                width: 30px;
                height: 30px;
                font-size: 12px;
            }

            .agency-grid {
                grid-template-columns: 1fr;
            }

            .impact-table {
                font-size: 11px;
            }

            .impact-table th, .impact-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-content">
                <h1>Digital Asset Regulatory Intelligence</h1>
                <p>TRACKER v1.0 | Crypto Regulatory Landscape 2022–2026</p>
            </div>
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle">Light Mode</button>
                <div class="view-toggle">
                    <button class="view-btn active" data-view="card">Cards</button>
                    <button class="view-btn" data-view="timeline">Timeline</button>
                    <button class="view-btn" data-view="agencies">Agencies</button>
                    <button class="view-btn" data-view="impact">Impact</button>
                </div>
            </div>
        </header>

        <!-- Controls -->
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search legislation, agencies, keywords...">
            </div>
            <div class="filter-group">
                <span class="filter-label">Status</span>
                <div class="filter-buttons" id="statusFilters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="enacted">Enacted</button>
                    <button class="filter-btn" data-filter="proposed">Proposed</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="blocked">Blocked</button>
                    <button class="filter-btn" data-filter="monitoring">Monitoring</button>
                </div>
            </div>
            <div class="filter-group">
                <span class="filter-label">Agency</span>
                <div class="filter-buttons" id="agencyFilters">
                    <button class="filter-btn active" data-filter="all">All</button>
                </div>
            </div>
        </div>

        <!-- Card View -->
        <div class="tab-content active" id="cardView">
            <div class="cards-grid" id="cardsContainer"></div>
        </div>

        <!-- Timeline View -->
        <div class="tab-content" id="timelineView">
            <div class="timeline" id="timelineContainer"></div>
        </div>

        <!-- Agencies View -->
        <div class="tab-content" id="agenciesView">
            <div class="agency-grid" id="agenciesContainer"></div>
        </div>

        <!-- Impact View -->
        <div class="tab-content" id="impactView">
            <div id="impactContainer"></div>
        </div>
    </div>
