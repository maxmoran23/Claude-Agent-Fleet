<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Slack Workspace — Interactive Mockup</title>
<meta name="description" content="A self-contained, interactive mockup of the Claude Agent Fleet's Slack workspace: channel taxonomy, Block Kit message components, alerts, digests, and canvases.">
<style>
  :root {
    /* content surfaces (match the rest of the showcase) */
    --bg: #0d1117; --surface: #161b22; --surface-2: #1c222b; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --faint: #6e7681; --accent: #58a6ff;
    /* slack-flavored sidebar */
    --side: #1a1d29; --side-2: #20232f; --side-text: #c9cdd6; --side-muted: #7e8493;
    --side-active: #3d7eff; --side-active-bg: #2b3a63;
    /* severities */
    --crit: #ff5b6e; --crit-bar: #d7263d; --high: #ff8a4c; --high-bar: #f46a25;
    --med: #ffd24c; --med-bar: #f4c025; --low: #4fd18b; --low-bar: #2eb872;
    --info: #6ea8ff; --info-bar: #3d7eff;
    --radius: 10px;
    --mono: "SF Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  [data-theme="light"] {
    --bg: #ffffff; --surface: #f6f8fa; --surface-2: #eef1f5; --border: #d0d7de;
    --text: #1f2328; --muted: #59636e; --faint: #818b96; --accent: #0969da;
    --side: #3f0e40; --side-2: #4a154b; --side-text: #e8d9e9; --side-muted: #bfa9c0;
    --side-active: #1164a3; --side-active-bg: #1164a3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    line-height: 1.5; -webkit-font-smoothing: antialiased;
  }

  /* ---------- top bar ---------- */
  .topbar {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 18px; background: var(--surface);
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 30;
  }
  .topbar .brand { font-weight: 700; letter-spacing: .01em; font-size: .98rem; }
  .topbar .brand span { color: var(--muted); font-weight: 400; }
  .topbar .spacer { flex: 1; }
  .topbar a, .pill {
    color: var(--muted); text-decoration: none; font-size: .82rem;
    border: 1px solid var(--border); border-radius: 999px; padding: 5px 12px;
    background: var(--bg); cursor: pointer; transition: all .15s ease;
  }
  .topbar a:hover, .pill:hover { color: var(--text); border-color: var(--accent); }

  /* ---------- layout ---------- */
  .app {
    display: grid; grid-template-columns: 270px minmax(0,1fr) 340px;
    height: calc(100vh - 49px); min-height: 0;
  }
  @media (max-width: 1100px) { .app { grid-template-columns: 240px minmax(0,1fr); } .canvaspane { display: none; } }
  @media (max-width: 760px)  { .app { grid-template-columns: 1fr; } .sidebar { display: none; } }

  /* ---------- sidebar ---------- */
  .sidebar {
    background: var(--side); color: var(--side-text);
    overflow-y: auto; border-right: 1px solid rgba(0,0,0,.25);
  }
  .ws-head {
    padding: 16px 16px 12px; border-bottom: 1px solid rgba(255,255,255,.08);
    display: flex; align-items: center; gap: 10px;
  }
  .ws-logo {
    width: 34px; height: 34px; border-radius: 8px; flex: none;
    background: linear-gradient(135deg, #5b8cff, #8a5bff);
    display: grid; place-items: center; font-weight: 800; color: #fff; font-size: .9rem;
  }
  .ws-head .name { font-weight: 700; font-size: .92rem; color: #fff; line-height: 1.15; }
  .ws-head .who { font-size: .74rem; color: var(--side-muted); }
  .ws-head .who::before { content: "🟢 "; }

  .grp { padding: 14px 8px 2px; }
  .grp-label {
    font-size: .68rem; text-transform: uppercase; letter-spacing: .08em;
    color: var(--side-muted); padding: 4px 10px; font-weight: 700;
  }
  .chan {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 6px 10px; border-radius: 6px; cursor: pointer;
    color: var(--side-text); font-size: .9rem; border: none; background: none;
    text-align: left; transition: background .12s ease;
  }
  .chan:hover { background: var(--side-2); }
  .chan.active { background: var(--side-active-bg); color: #fff; font-weight: 600; }
  .chan .hash { color: var(--side-muted); width: 16px; text-align: center; flex: none; }
  .chan.active .hash { color: #cfe0ff; }
  .chan .nm { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chan .badge {
    background: var(--crit); color: #fff; font-size: .68rem; font-weight: 700;
    border-radius: 999px; padding: 1px 7px; flex: none;
  }
  .chan .badge.soft { background: rgba(255,255,255,.16); color: #fff; }
  .chan .mute { font-size: .72rem; color: var(--side-muted); flex: none; }

  /* ---------- main message pane ---------- */
  .main { display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
  .chan-head {
    padding: 12px 22px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  .chan-title { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.04rem; }
  .chan-title .hash { color: var(--muted); }
  .chan-title .star { color: var(--faint); font-size: .9rem; }
  .health {
    margin-top: 5px; font-size: .8rem; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .health .dot { font-size: .7rem; }
  .bookmarks { margin-top: 9px; display: flex; gap: 6px; flex-wrap: wrap; }
  .bm {
    font-size: .76rem; color: var(--muted); text-decoration: none;
    border: 1px solid var(--border); border-radius: 6px; padding: 3px 9px;
    background: var(--surface); transition: all .15s ease; cursor: pointer;
  }
  .bm:hover { color: var(--text); border-color: var(--accent); }

  .feed { overflow-y: auto; padding: 8px 0 60px; flex: 1; }
  .daysep { display: flex; align-items: center; gap: 12px; margin: 14px 22px 6px; }
  .daysep::before, .daysep::after { content: ""; height: 1px; background: var(--border); flex: 1; }
  .daysep span {
    font-size: .74rem; font-weight: 700; color: var(--muted);
    border: 1px solid var(--border); border-radius: 999px; padding: 2px 12px; background: var(--surface);
  }

  /* ---------- a slack message ---------- */
  .msg { display: flex; gap: 12px; padding: 9px 22px; position: relative; }
  .msg:hover { background: var(--surface); }
  .avatar {
    width: 38px; height: 38px; border-radius: 9px; flex: none;
    display: grid; place-items: center; font-size: 1.1rem; color: #fff; font-weight: 700;
  }
  .msg-body { min-width: 0; flex: 1; }
  .msg-head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .msg-head .author { font-weight: 700; font-size: .92rem; }
  .msg-head .bot {
    font-size: .62rem; font-weight: 700; letter-spacing: .03em; text-transform: uppercase;
    background: var(--surface-2); color: var(--muted); border: 1px solid var(--border);
    border-radius: 4px; padding: 0 4px; transform: translateY(-1px);
  }
  .msg-head .ts { font-size: .74rem; color: var(--faint); }

  /* ---------- block kit card ---------- */
  .bk {
    margin-top: 6px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); overflow: hidden; max-width: 720px;
  }
  .bk.stripe { border-left: 4px solid var(--accent); }
  .bk.crit { border-left-color: var(--crit-bar); }
  .bk.high { border-left-color: var(--high-bar); }
  .bk.med  { border-left-color: var(--med-bar); }
  .bk.low  { border-left-color: var(--low-bar); }
  .bk.info { border-left-color: var(--info-bar); }
  .bk-inner { padding: 13px 16px; }
  .bk h3 { font-size: .98rem; line-height: 1.3; display: flex; gap: 7px; align-items: baseline; }
  .bk .ctx { font-size: .76rem; color: var(--muted); margin-top: 5px; }
  .bk .ctx code, .bk .body code, .fieldv code {
    font-family: var(--mono); font-size: .82em; background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 4px; padding: 0 4px;
  }
  .bk .body { margin-top: 9px; font-size: .89rem; color: var(--text); }
  .bk .body b, .fields b { color: var(--text); }
  .fields {
    margin-top: 11px; display: grid; grid-template-columns: 1fr 1fr; gap: 9px 18px;
  }
  .field .fieldk { font-size: .72rem; color: var(--muted); font-weight: 700; }
  .field .fieldv { font-size: .9rem; margin-top: 1px; }
  .bk-divider { height: 1px; background: var(--border); margin: 0; }

  /* dynamic image card placeholder */
  .imgcard {
    margin-top: 11px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    background: #0a0c10;
  }
  [data-theme="light"] .imgcard { background: #0d1117; }
  .imgcard .ic-top { display: flex; justify-content: space-between; align-items: flex-start; padding: 14px 16px 4px; }
  .imgcard .ic-label { font-size: .72rem; letter-spacing: .04em; text-transform: uppercase; color: #8b949e; }
  .imgcard .ic-ts { font-size: .68rem; color: #586069; font-family: var(--mono); }
  .imgcard .ic-num { font-size: 2.3rem; font-weight: 800; color: #e6edf3; padding: 0 16px; line-height: 1.1; }
  .imgcard .ic-num .trend { font-size: 1rem; font-weight: 700; margin-left: 8px; }
  .imgcard .ic-foot { display: flex; gap: 18px; padding: 4px 16px 14px; }
  .imgcard .ic-foot div { font-size: .72rem; color: #8b949e; }
  .imgcard .ic-foot b { color: #c9d1d9; }
  .imgcard .ic-alt { font-size: .68rem; color: var(--faint); padding: 6px 16px; border-top: 1px solid var(--border); background: var(--surface); font-style: italic; }
  .trend.up { color: var(--low); } .trend.down { color: var(--crit); } .trend.flat { color: var(--muted); }

  /* actions row */
  .actions { display: flex; gap: 8px; flex-wrap: wrap; padding: 11px 16px; align-items: center; }
  .btn {
    font-size: .82rem; font-weight: 600; border: 1px solid var(--border); background: var(--bg);
    color: var(--text); border-radius: 7px; padding: 6px 12px; cursor: pointer; transition: all .14s ease;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--low-bar); border-color: var(--low-bar); color: #fff; }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.danger { background: var(--crit-bar); border-color: var(--crit-bar); color: #fff; }
  .btn.danger:hover { filter: brightness(1.08); }
  .btn.ghost { background: transparent; }
  .overflow {
    margin-left: auto; border: 1px solid var(--border); background: var(--bg); color: var(--muted);
    border-radius: 7px; width: 30px; height: 30px; cursor: pointer; font-weight: 700;
  }
  .overflow:hover { color: var(--text); border-color: var(--accent); }
  .bk-foot { font-size: .74rem; color: var(--faint); padding: 0 16px 12px; }
  .bk-foot em { color: var(--muted); }

  /* reactions + thread line */
  .react { display: flex; gap: 6px; margin-top: 7px; flex-wrap: wrap; align-items: center; }
  .chip {
    font-size: .78rem; border: 1px solid var(--border); background: var(--surface-2);
    border-radius: 999px; padding: 1px 9px; color: var(--muted); cursor: default;
  }
  .chip b { color: var(--accent); font-weight: 700; }
  .thread {
    margin-top: 7px; font-size: .8rem; color: var(--accent); cursor: pointer; display: inline-flex; gap: 6px; align-items: center;
  }
  .thread:hover { text-decoration: underline; }
  .thread .ava { width: 18px; height: 18px; border-radius: 5px; display: inline-grid; place-items: center; font-size: .62rem; color: #fff; }

  /* ---------- canvas pane ---------- */
  .canvaspane { background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; }
  .cv-head { padding: 14px 18px 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); }
  .cv-head .k { font-size: .7rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 700; }
  .cv-head .t { font-weight: 700; margin-top: 3px; display: flex; gap: 7px; align-items: center; }
  .cv-body { padding: 12px 18px 40px; }
  .cv-sec { margin-top: 16px; }
  .cv-sec h4 { font-size: .76rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 6px; }
  .cv-sec p, .cv-sec li { font-size: .84rem; color: var(--text); }
  .cv-sec ul { padding-left: 18px; }
  table.cv { width: 100%; border-collapse: collapse; font-size: .8rem; }
  table.cv th, table.cv td { text-align: left; padding: 5px 7px; border-bottom: 1px solid var(--border); }
  table.cv th { color: var(--muted); font-weight: 700; font-size: .72rem; }
  table.cv td code { font-family: var(--mono); font-size: .82em; }
  .spark { font-family: var(--mono); font-size: .82rem; color: var(--low); letter-spacing: 1px; }
  .legend { font-size: .76rem; color: var(--muted); padding: 14px 18px; border-top: 1px solid var(--border); }
  .legend b { color: var(--text); }

  /* intro strip */
  .intro {
    padding: 14px 22px; background: linear-gradient(180deg, var(--surface), transparent);
    border-bottom: 1px solid var(--border); font-size: .84rem; color: var(--muted);
  }
  .intro b { color: var(--text); }
  .badge-soft { color: var(--side-muted); }
</style>
</head>
<body data-theme="dark">

<div class="topbar">
  <span class="brand">Fleet Slack Workspace <span>· interactive mockup</span></span>
  <div class="spacer"></div>
  <a href="../">← Showcase</a>

</div>

<div class="app">

  <!-- ============ SIDEBAR ============ -->
  <nav class="sidebar" id="sidebar"><!-- channels injected --></nav>

  <!-- ============ MAIN ============ -->
  <section class="main">
    <header class="chan-head" id="chanHead"></header>

</div>

<script>
/* ============================================================
   Data model — the workspace, its channels, and message blocks.
   This is a static portrait of the fleet's Slack surface, built
   from the conventions in schemas/slack-workspace-architecture.md
   and schemas/slack-block-kit-templates.md.
   ============================================================ */

const AVATARS = {
  market:    { bg: "linear-gradient(135deg,#2e7d32,#66bb6a)", ic: "📈" },
  regoracle: { bg: "linear-gradient(135deg,#5e35b1,#9575cd)", ic: "⚖️" },
  onchain:   { bg: "linear-gradient(135deg,#00897b,#4db6ac)", ic: "🔗" },
  sanctions: { bg: "linear-gradient(135deg,#c62828,#ef5350)", ic: "🛡️" },
  research:  { bg: "linear-gradient(135deg,#1565c0,#42a5f5)", ic: "🗞️" },
  watchdog:  { bg: "linear-gradient(135deg,#37474f,#78909c)", ic: "🐕" },
  synthesis: { bg: "linear-gradient(135deg,#6a1b9a,#ab47bc)", ic: "🧬" },
  operator:  { bg: "linear-gradient(135deg,#455a64,#90a4ae)", ic: "🧑" },
  query:     { bg: "linear-gradient(135deg,#0277bd,#4fc3f7)", ic: "💬" },
};

const SIDEBAR = [
  { label: "Intelligence Feeds", channels: ["intel-markets","intel-regulatory","intel-onchain","intel-research"] },
  { label: "Escalation & Brief", channels: ["alerts","digest"] },
  { label: "Fleet & Interaction", channels: ["fleet-ops","ask-fleet","lab"] },
];

/* helper builders for block-kit-ish fragments */
function fields(arr){ return `<div class="fields">${arr.map(f=>`<div class="field"><div class="fieldk">${f.k}</div><div class="fieldv">${f.v}</div></div>`).join("")}</div>`; }
function imgcard(o){
  return `<div class="imgcard" role="img" aria-label="${o.alt}">
    <div class="ic-top"><span class="ic-label">${o.label}</span><span class="ic-ts">${o.ts}</span></div>
    <div class="ic-num">${o.num}<span class="trend ${o.dir}">${o.delta}</span></div>
    <div class="ic-foot">${o.foot.map(f=>`<div>${f}</div>`).join("")}</div>
    <div class="ic-alt">alt: ${o.alt}</div>
  </div>`;
}
function actions(btns){
  const items = btns.map(b=>{
    if(b.type==="overflow") return `<button class="overflow" title="More actions">⋯</button>`;
    const cls = b.style ? `btn ${b.style}` : "btn";
    return `<button class="${cls}">${b.t}</button>`;
  }).join("");
  return `<div class="actions">${items}</div>`;
}

/* ============ CHANNELS ============ */
const CHANNELS = {
  "intel-markets": {

        foot:"Market Pulse · kernel v1.5 · #intel-markets",
        react:[{e:"✅",n:1}] },
    ]
  },

  "intel-regulatory": {
    emoji:"🛰", title:"intel-regulatory",
    health:{state:"🟢", text:"healthy · last run 09:40 UTC · quality 9.1 · 0 open escalations"},
    desc:"Regulatory intelligence · Regulatory Oracle + Model Governance · daily + on-event · canvas pinned",
    badge:null, canvas:"regulatory",
    msgs:[
      { author:"Regulatory Oracle", av:"regoracle", ts:"09:40", sev:"high",
        title:"🟠 Interpretive guidance flagged for compliance review",

  "intel-onchain": {
    emoji:"🛰", title:"intel-onchain",
    health:{state:"🟢", text:"healthy · last run 14:06 UTC · quality 8.9 · 1 open escalation"},
    desc:"On-chain intelligence · Watchlist + Sanctions + DeFi monitors · continuous · canvas pinned",
    badge:{type:"soft", n:"1"}, canvas:"onchain",
    msgs:[
      { author:"Sanctions List Monitor", av:"sanctions", ts:"14:06", sev:"crit",
        title:"🔴 CRITICAL — Sanctions hit on watched address",
        ctx:"<code>14:06 UTC</code> · run <code>sm-2026-0614-1406</code> · quality <b>8.9/10</b> · escalated to #alerts + DM",
        body:"Watched address <code>0xAB…01</code> transacted with newly-added OFAC SDN entry <b>EXAMPLE-SDN-2026-042</b>. Exposure <b>1.2M USDT</b> across 3 hops within the configured 1M threshold window.",
        flds:[{k:"Source",v:"Sanctions List Monitor"},{k:"Detected",v:"14:06 UTC"},{k:"Confidence",v:"HIGH (direct match)"},{k:"Exposure",v:"1.2M USDT"}],

/* ============ render ============ */
function sidebarChannelRow(id, active){
  const c = CHANNELS[id];
  let badge = "";
  if (c.badge) badge = `<span class="badge ${c.badge.type==='soft'?'soft':''}">${c.badge.n}</span>`;
  const muted = ["alerts","ask-fleet"].includes(id) ? "" : `<span class="mute" title="muted by default">🔕</span>`;
  return `<button class="chan ${active?'active':''}" data-ch="${id}">
    <span class="hash">#</span><span class="nm">${c.title}</span>${badge}${muted}
  </button>`;
}

function renderSidebar(active){
  const side = document.getElementById("sidebar");
  let html = `<div class="ws-head">
      <div class="ws-logo">AF</div>
      <div><div class="name">Agent Fleet</div><div class="who">operator</div></div>
    </div>`;
  for (const g of SIDEBAR){
    html += `<div class="grp"><div class="grp-label">${g.label}</div>`;
    html += g.channels.map(id=>sidebarChannelRow(id, id===active)).join("");
    html += `</div>`;
  }
  side.innerHTML = html;
  side.querySelectorAll(".chan").forEach(b=>{
    b.addEventListener("click", ()=>select(b.dataset.ch));
  });
}

function renderHead(id){
  const c = CHANNELS[id];
  const bms = ["📌 State Canvas","📈 Live Dashboard","🗂 Archive","📖 Agent Spec"]
    .map(b=>`<span class="bm">${b}</span>`).join("");
  document.getElementById("chanHead").innerHTML = `
    <div class="chan-title"><span class="hash">#</span>${c.title}<span class="star">☆</span></div>
    <div class="health"><span class="dot">${c.health.state}</span><span>${c.health.text}</span></div>
    <div class="bookmarks">${bms}</div>`;
}

function renderMsg(m){
  const a = AVATARS[m.av] || AVATARS.operator;
  const avatar = `<div class="avatar" style="background:${a.bg}">${a.ic}</div>`;
  const head = `<div class="msg-head"><span class="author">${m.author}</span>${m.plain?'':'<span class="bot">App</span>'}<span class="ts">${m.ts}</span></div>`;

  if (m.plain){
    return `<div class="msg">${avatar}<div class="msg-body">${head}<div style="margin-top:3px;font-size:.92rem">${m.body}</div></div></div>`;
  }

  let inner = `<h3>${m.title}</h3>`;
  if (m.ctx) inner += `<div class="ctx">${m.ctx}</div>`;
  if (m.body) inner += `<div class="body">${m.body}</div>`;
  if (m.flds) inner += fields(m.flds);
  if (m.grid) inner += `<div class="fields" style="grid-template-columns:1fr 1fr 1fr">${m.grid.map(g=>`<div class="fieldv" style="font-size:.82rem">${g}</div>`).join("")}</div>`;
  if (m.digest) inner += m.digest.map(d=>`<div class="body"><b>${d.h}</b><br>${d.t}</div>`).join("");
  if (m.img) inner += imgcard(m.img);

  let card = `<div class="bk stripe ${m.sev||''}"><div class="bk-inner">${inner}</div>`;
  if (m.btns){ card += `<div class="bk-divider"></div>` + actions(m.btns); }
  if (m.foot){ card += `<div class="bk-foot">${m.foot}</div>`; }
  card += `</div>`;

  let extras = "";
  if (m.react) extras += `<div class="react">${m.react.map(r=>`<span class="chip">${r.e} <b>${r.n}</b></span>`).join("")}<span class="chip" style="cursor:pointer">＋</span></div>`;
  if (m.thread){
    const avs = m.thread.avs.map(av=>{const a=AVATARS[av]||AVATARS.operator;return `<span class="ava" style="background:${a.bg}">${a.ic}</span>`;}).join("");
    extras += `<div class="thread">${avs}<span>${m.thread.n} repl${m.thread.n>1?'ies':'y'}</span><span style="color:var(--faint)">· ${m.thread.last}</span></div>`;
  }

  return `<div class="msg">${avatar}<div class="msg-body">${head}${card}${extras}</div></div>`;
}

function renderFeed(id){
  const c = CHANNELS[id];
  const feed = document.getElementById("feed");
  const intro = `<div class="intro"><b>#${c.title}</b> — ${c.desc}</div>`;
  const sep = `<div class="daysep"><span>Today · 14 Jun 2026</span></div>`;
  feed.innerHTML = intro + sep + c.msgs.map(renderMsg).join("");
  feed.scrollTop = 0;
}

function renderCanvas(id){
  const c = CHANNELS[id];
  const pane = document.getElementById("canvasPane");
  if (!c.canvas || !CANVASES[c.canvas]){
    pane.innerHTML = `<div class="cv-head"><div class="k">Pinned canvas</div><div class="t">— none for this channel —</div></div>
      <div class="cv-body"><p style="color:var(--muted);font-size:.85rem">Escalation, digest, and interaction channels don't pin a state canvas. Intel and fleet-ops channels mirror their agent's live state here.</p></div>
      ${legend()}`;
    return;
  }
  const cv = CANVASES[c.canvas];
  let body = "";
  for (const s of cv.secs){
    body += `<div class="cv-sec"><h4>${s.h}</h4>`;
    if (s.list) body += `<ul>${s.list.map(i=>`<li>${i}</li>`).join("")}</ul>`;
    if (s.table){
      body += `<table class="cv"><tr>${s.table.cols.map(c=>`<th>${c}</th>`).join("")}</tr>`;
      body += s.table.rows.map(r=>`<tr>${r.map(x=>`<td>${x.startsWith('0x')?`<code>${x}</code>`:x}</td>`).join("")}</tr>`).join("");
      body += `</table>`;
    }
    if (s.spark) body += `<div class="spark">${s.spark}</div><p style="color:var(--muted);font-size:.78rem;margin-top:3px">${s.note}</p>`;
    body += `</div>`;
  }
  pane.innerHTML = `<div class="cv-head"><div class="k">📌 Pinned canvas</div><div class="t">${cv.health} ${cv.title}</div>
      <div style="font-size:.72rem;color:var(--muted);margin-top:3px">Last updated ${cv.updated}</div></div>
    <div class="cv-body">${body}</div>${legend()}`;
}

function legend(){
  return `<div class="legend">
    <b>Severity</b> &nbsp; 🔴 critical &nbsp; 🟠 high &nbsp; 🟡 medium &nbsp; 🟢 low &nbsp; 🔵 info<br>
    <b>Channels</b> &nbsp; 🔕 muted by default · #alerts & #ask-fleet notify<br>
    <span style="color:var(--faint)">Static portrait — built from the workspace + Block Kit specs in <code style="font-family:var(--mono)">schemas/</code>.</span>
  </div>`;
}

function select(id){
  renderSidebar(id);
  renderHead(id);
  renderFeed(id);
  renderCanvas(id);
  history.replaceState(null, "", "#"+id);
}

/* theme toggle */
document.getElementById("themeToggle").addEventListener("click", ()=>{
  const b = document.body;
  b.dataset.theme = b.dataset.theme === "dark" ? "light" : "dark";
});

/* boot */
const start = (location.hash||"").replace("#","");
select(CHANNELS[start] ? start : "intel-onchain");
