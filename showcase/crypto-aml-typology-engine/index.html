<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto AML Typology Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1a2847;
            --bg-tertiary: #253858;
            --text-primary: #e2e8f0;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --accent-critical: #ef4444;
            --accent-high: #f97316;
            --accent-medium: #eab308;
            --accent-info: #3b82f6;
            --accent-success: #10b981;
            --border-color: #334155;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-tertiary: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #1e293b;
            --text-tertiary: #475569;
            --border-color: #cbd5e1;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .category-section {
            margin-bottom: 28px;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-tertiary);
        }

        .category-count {
            background-color: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-info);
        }

        .typology-list {
            list-style: none;
        }

        .typology-item {
            margin-bottom: 8px;
        }

        .typology-link {
            display: block;
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            border-left: 2px solid transparent;
            transition: all 0.2s;
        }

        .typology-link:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border-left-color: var(--accent-info);
        }

        .typology-link.active {
            background-color: var(--bg-tertiary);
            color: var(--accent-info);
            border-left-color: var(--accent-info);
            font-weight: 500;
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1440px;
        }

        .header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 20px;
            sticky: 0;
            z-index: 10;
        }

        .header-content {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-info);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .filter-group {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 14px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background-color: rgba(59, 130, 246, 0.1);
            border-color: var(--accent-info);
            color: var(--accent-info);
        }

        .filter-btn.active {
            background-color: var(--accent-info);
            border-color: var(--accent-info);
            color: white;
        }

        .content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }

        .typology-detail {
            display: none;
        }

        .typology-detail.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .typology-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 28px;
            margin-bottom: 20px;
        }

        .typology-header {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .typology-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 600;
            color: var(--accent-info);
            min-width: 50px;
        }

        .typology-title-section {
            flex: 1;
        }

        .typology-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .typology-badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-family: 'JetBrains Mono', monospace;
        }

        .badge-critical {
            background-color: rgba(239, 68, 68, 0.15);
            color: var(--accent-critical);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .badge-high {
            background-color: rgba(249, 115, 22, 0.15);
            color: var(--accent-high);
            border: 1px solid rgba(249, 115, 22, 0.3);
        }

        .badge-medium {
            background-color: rgba(234, 179, 8, 0.15);
            color: var(--accent-medium);
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        .badge-category {
            background-color: rgba(59, 130, 246, 0.15);
            color: var(--accent-info);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .section-content {
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .description-text {
            font-size: 14px;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }

        .indicator-list, .rule-list, .step-list {
            list-style: none;
            margin: 0;
        }

        .indicator-list li, .rule-list li, .step-list li {
            padding: 10px 0;
            padding-left: 16px;
            border-left: 2px solid var(--border-color);
            margin-bottom: 8px;
            font-size: 13px;
            line-height: 1.6;
        }

        .indicator-list li:before {
            content: "⚠";
            margin-right: 8px;
            color: var(--accent-high);
        }

        .rule-list li:before {
            content: "∅";
            margin-right: 8px;
            color: var(--accent-info);
        }

        .step-list li:before {
            content: "→";
            margin-right: 8px;
            color: var(--accent-success);
        }

        .code-block {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 12px;
            margin: 8px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            overflow-x: auto;
            color: var(--accent-info);
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-tertiary);
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background-color: var(--accent-info);
            color: white;
            border-color: var(--accent-info);
        }

        .citation {
            background-color: rgba(59, 130, 246, 0.05);
            border-left: 3px solid var(--accent-info);
            padding: 12px;
            margin: 12px 0;
            border-radius: 3px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .scenario-box {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            padding: 12px;
            margin: 8px 0;
            border-radius: 4px;
            font-size: 13px;
        }

        .scenario-label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .related-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .related-link {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
            color: var(--accent-info);
            transition: all 0.2s;
        }

        .related-link:hover {
            background-color: rgba(59, 130, 246, 0.1);
            border-color: var(--accent-info);
        }

        .no-results {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-tertiary);
        }

        .no-results h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                width: 200px;
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                max-height: 300px;
            }

            .header-content {
                flex-direction: column;
            }

            .filter-group {
                width: 100%;
                flex-wrap: wrap;
            }

            .typology-card {
                padding: 16px;
            }
        }

        @media print {
            .sidebar, .header {
                display: none;
            }

            .content {
                padding: 20px;
            }

            .typology-card {
                page-break-inside: avoid;
                border: 1px solid #ccc;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Typology Library</div>
                <button class="theme-toggle" id="themeToggle" title="Toggle theme">
                    <span id="themeIcon">🌙</span>
                </button>
            </div>

            <div id="categoriesContainer"></div>
        </div>

        <!-- Main Content -->
        <div class="main">
            <div class="header">
                <div class="header-content">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search typologies...">
                    </div>
                    <div class="filter-group">
                        <button class="filter-btn" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="critical">Critical</button>
                        <button class="filter-btn" data-filter="high">High</button>
                        <button class="filter-btn" data-filter="medium">Medium</button>
                    </div>
                </div>
            </div>

            <div class="content" id="contentArea">
                <div class="no-results">
                    <h3>Select a typology to begin</h3>
                    <p>Use the sidebar or search to find crypto AML typologies</p>
                </div>
            </div>
        </div>
    </div>

        // Initialize
        function initApp() {
            renderCategories();
            setupEventListeners();
            displayDefaultView();
        }

        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            const categories = {};

            // Group typologies by category
            typologies.forEach(typ => {
                if (!categories[typ.category]) {
                    categories[typ.category] = [];
                }
                categories[typ.category].push(typ);
            });

            // Render each category
            Object.keys(categories).forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category-section';

                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `
                    <span>${cat}</span>
                    <span class="category-count">${categories[cat].length}</span>
                `;
                section.appendChild(header);

                const list = document.createElement('ul');
                list.className = 'typology-list';

                categories[cat].forEach(typ => {
                    const item = document.createElement('li');
                    item.className = 'typology-item';
                    const link = document.createElement('div');
                    link.className = 'typology-link';
                    link.textContent = `${typ.number} ${typ.title}`;
                    link.onclick = () => displayTypology(typ.id);
                    item.appendChild(link);
                    list.appendChild(item);
                });

                section.appendChild(list);
                container.appendChild(section);
            });
        }

        function displayTypology(id) {
            const typology = typologies.find(t => t.id === id);
            if (!typology) return;

            // Update active state
            document.querySelectorAll('.typology-link').forEach(link => {
                link.classList.remove('active');
            });
            event.target.closest('.typology-link').classList.add('active');

            const content = document.getElementById('contentArea');
            content.innerHTML = `
                <div class="typology-detail active">
                    <div class="typology-card">
                        <div class="typology-header">
                            <div class="typology-number">${typology.number}</div>
                            <div class="typology-title-section">
                                <div class="typology-title">${typology.title}</div>
                                <div class="typology-badges">
                                    <div class="badge badge-${typology.severity}">${typology.severity.toUpperCase()}</div>
                                    <div class="badge badge-category">${typology.category}</div>
                                </div>
                            </div>
                        </div>

                        <div class="section">
                            <div class="section-title">Description</div>

                                <p class="description-text">${typology.description}</p>
                            </div>
                        </div>

                        <div class="section">
                            <div class="section-title">Red Flag Indicators</div>
                            <ul class="indicator-list">
                                ${typology.indicators.map(ind => `<li>${ind}</li>`).join('')}
                            </ul>
                        </div>

                        <div class="section">
                            <div class="section-title">Detection Rules</div>
                            ${typology.detectionRules.map((rule, i) => `
                                <div style="margin-bottom: 16px;">
                                    <div style="font-weight: 500; margin-bottom: 8px; color: var(--text-primary);">Rule ${i + 1}</div>

                                        ${rule.rule}
                                        <button class="copy-btn" onclick="copyToClipboard('${rule.rule.replace(/'/g, "\\'")}')">Copy</button>

                                    <div style="font-size: 12px; color: var(--text-tertiary); margin-top: 6px;">
                                        <div><strong>Threshold:</strong> ${rule.threshold}</div>

        function setupEventListeners() {
            // Theme toggle
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);

            // Search
            document.getElementById('searchInput').addEventListener('input', handleSearch);

            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', handleFilter);
            });
        }

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme') || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('themeIcon').textContent = next === 'dark' ? '🌙' : '☀️';
        }

        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            if (!query) {
                displayDefaultView();
                return;
            }

            const results = typologies.filter(typ =>
                typ.title.toLowerCase().includes(query) ||
                typ.description.toLowerCase().includes(query) ||
                typ.category.toLowerCase().includes(query)
            );

            displaySearchResults(results);
        }

        function handleFilter(e) {
            const severity = e.target.dataset.filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            e.target.classList.add('active');

            const filtered = severity === 'all' ? typologies : typologies.filter(t => t.severity === severity);
            displaySearchResults(filtered);
        }

        function displaySearchResults(results) {
            const content = document.getElementById('contentArea');
            if (results.length === 0) {
                content.innerHTML = '<div class="no-results"><h3>No typologies found</h3><p>Try a different search or filter</p></div>';
                return;
            }

            content.innerHTML = `
                <div class="typology-detail active">

                                    <div style="font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; cursor: pointer;" onclick="document.getElementById('searchInput').value=''; handleFilter({target: {dataset: {filter: 'all'}, classList: {remove: () => {}, add: () => {}}}});">${typ.title}</div>
                                    <div class="typology-badges">
                                        <div class="badge badge-${typ.severity}">${typ.severity.toUpperCase()}</div>

                            </div>
                            <p class="description-text">${typ.description}</p>
                            <button style="padding: 8px 14px; background-color: var(--accent-info); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500;" onclick="displayTypology(${typ.id})">View Full Details</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function displayDefaultView() {
            const content = document.getElementById('contentArea');
            content.innerHTML = '<div class="no-results"><h3>Select a typology to begin</h3><p>Use the sidebar or search to find crypto AML typologies</p></div>';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard');
            });
        }

        // Load theme from localStorage
        const saved = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
        document.getElementById('themeIcon').textContent = saved === 'dark' ? '🌙' : '☀️';

        initApp();
    </script>
</body>
</html>
